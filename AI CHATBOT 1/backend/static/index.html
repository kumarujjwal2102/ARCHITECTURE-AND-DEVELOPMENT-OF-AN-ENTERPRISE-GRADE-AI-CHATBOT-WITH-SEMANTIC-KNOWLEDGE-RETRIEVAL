<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Chatbot | Semantic RAG</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">🚀</span>
                <h1>Enterprise AI</h1>
            </div>
            <div class="upload-section">
                <h3>Knowledge Base</h3>
                <label for="pdf-upload" class="upload-label">
                    <span class="upload-icon">📁</span>
                    <span>Upload PDF</span>
                </label>
                <input type="file" id="pdf-upload" accept=".pdf" hidden>
                <div id="file-list" class="file-list"></div>
            </div>
            <button id="reset-btn" class="secondary-btn">Reset Database</button>
            <div class="sidebar-footer">
                <p>Powered by Ollama & ChromaDB</p>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-container">
            <header class="chat-header">
                <h2>Semantic Knowledge Retrieval</h2>
                <div id="status-indicator" class="status online">Online</div>
            </header>
            <div id="chat-messages" class="chat-messages">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="content">Hello! I am your Enterprise AI assistant. You can ask me anything, or upload documents to the knowledge base for specific context.</div>
                </div>
            </div>
            <div class="input-area">
                <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="/static/app.js"></script>
</body>
</html>
